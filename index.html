<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Porsche Compare</title>
<link rel="stylesheet" href="index.css">
</head>

<body>

<div id="start-page" class="container">
    <h1>Model Comparison</h1>
    <p>Compare your favourite Porsche models</p>

    <div class="button-group">
        <button class="btn1" onclick="showCars()">+ Select model</button>
        <button class="btn2" onclick="showCars()">+ Select model</button>
    </div>
</div>

<div id="cars-page" class="modal-overlay">
    <div class="modal-content">

        <header class="modal-header">
            <h2>Select 2 Cars</h2>
            <button class="close-btn" onclick="closeModal()">✕</button>
        </header>

        <div class="cars-table">

            <div class="car-card" onclick="toggleCar(this, '911')">
                <img src="img/911.webp">
                <h3>Porsche 911</h3>
                <p>308 km/h</p>
            </div>

            <div class="car-card" onclick="toggleCar(this, 'mecan')">
                <img src="img/macan.webp">
                <h3>Porsche Cayenne</h3>
                <p>245 km/h</p>
            </div>

            <div class="car-card" onclick="toggleCar(this, 'Taycan')">
                <img src="img/taycan.webp" alt="">
                <h3>Porsche Taycan</h3>
                <p>260 km/h</p>
            </div>

                <div class="car-card" onclick="toggleCar(this, 'panamera')">
                <img src="img/panamera.webp">
                <h3>Panamera</h3>
                <p>308 km/h</p>
            </div>

        </div>

        <footer class="modal-footer">
            <div class="slots">
                <div class="slot" id="slot1">Choose model</div>
                <div class="slot" id="slot2">Choose model</div>
            </div>

            <button id="compare-btn" onclick="goCompare()" disabled>
                Compare
            </button>
        </footer>

    </div>
</div>

<div id="compare-page">
    <h2>Comparison</h2>
     <button class="exit-btn" onclick="goBack()">
        Back
    </button>
    
    <div id="comparison-grid"></div>
</div>

<script src="index.js"></script>
</body>
</html>
